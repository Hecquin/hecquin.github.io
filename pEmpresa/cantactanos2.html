<!doctype html>
<html lang="es">

<head>
	<meta charset="utf-8">
	<title>GRAFICAS S.A.S</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="theme-color" content="#808080">	
	<link rel="stylesheet" href="estilos.css">
	<script language="JavaScript"> 
		function pregunta(){ 
		if (confirm('¿Estas seguro de enviar este Comentario?')){ 
       document.contactanos.submit() 
		} 
	} 
	</script> 
</head>

<body>
	<div id="contenedorGlobal">

		<div id="cabecera">
			<img id="logo" src="imagenes/logo.jpg" alt="Logotipo Empresa">
			<h1 id="nombre">GRÁFICAS S.A.S</h1>
		</div>

		<div id="empresa">
			<a id="Inicio" href="graficasSAS.html">Inicio</a>
			<a id="NuestraEmpresa" href="empresa.html">Nuestra Empresa</a>
			<a id="Servicios" href="servicios.html">Servicios</a>
			<a id="Contactanos" href="contactanos2.html">Contactanos</a>
		</div>

		<div id="Informacion">
			<h1>Impresiones Digitales</h1>
			<p>
				Cuenta con nosotros le damos imágen a tu empresa.
			</p><br>
			<!--AQUI VA EL FORM-->
			<form name="contactanos" action="" method="">
				<div>
					<label for="nombre"> Nombres:</label><br/>				
					<input type="text" class="formula" id="nombre" placeholder="Ingrese Nombres">
				<div>
					<label for="apellidos"> Apellidos:</label><br/>				
					<input type="text" class="formula" id="apellidos"placeholder="Ingrese Apellidos">
				</div>
				<div>
					<label for="telefono"> Telefono:</label><br/>				
					<input type="text" class="formula" id="telefono" placeholder="Ingrese Telefono">
				</div>
				<div>
					<label for="correo"> Dirección de Correo:</label><br/>				
					<input type="email" class="formula" id="correo" placeholder="Ingrese Dirección e-mail">
				</div>
				<div>
					<label for="comentario"> Comentario o Sugerencia:</label><br/></textarea><br/>
					<textarea class="formula" placeholder="Comentario o Sugerencia"></textarea><br/>
					<input type="button" class="btn" onclick="pregunta()" value="Enviar Comentario">
				</div>
				<div>
					<p class="centrarcontenido">				
					
				</p>
				</div>
			</form>
		</div>

		<div id="pie">
			<p>Gracias por visitar nuestro sitio web, recuerda que estamos para servirte.</p>
		</div>
	</div>
</body>

</html>
